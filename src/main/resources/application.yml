server:
  address: ${HOST:0.0.0.0}
  port: ${PORT:8000}

spring:
  ai:
    mcp:
      server:
        protocol: STREAMABLE
        name: aigohotel-mcp
        version: 1.0.0
        type: SYNC
        annotation-scanner:
          enabled: true
        streamable-http:
          mcp-endpoint: ${MCP_ENDPOINT:/mcp}
          keep-alive-interval: 30s
        tool-response-mime-type:
          searchHotels: application/json
          getHotelDetail: application/json
          getHotelSearchTags: application/json

aigohotel:
  api-key: ${AIGOHOTEL_API_KEY:}
  secret-key: ${AIGOHOTEL_SECRET_KEY:mcp_caf6f0b0a10242e7b88a7417962a3a2a}

logging:
  level:
    root: INFO
